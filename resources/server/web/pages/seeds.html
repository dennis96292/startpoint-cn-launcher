<!doctype html>
<html lang="zh">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/public/tailwind.css"><title>种子验证器 - Starpoint</title>
    <style>
        .card { padding: 1rem; border: 1px solid var(--color-outline-variant); border-radius: 1.5rem; margin-bottom: 1rem; }
        .stat { padding: 0.5rem 1rem; border: 1px solid var(--color-outline-variant); border-radius: 0.75rem; display: inline-block; margin: 0.25rem; }
        .stat .label { color: var(--color-on-surface-variant); font-size: 0.7rem; text-transform: uppercase; }
        .stat .value { font-size: 1.2rem; font-weight: bold; }
        .unk{color:#6e7681} .p1{color:#d29922} .ok{color:#3fb950} .pur{color:#a371f7} .hot{color:#f85149}
        .mode-btn { padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid var(--color-outline-variant); cursor: pointer; font-size: 0.9rem; background: transparent; color: var(--color-on-surface); }
        .mode-btn.active { background: var(--color-primary); color: var(--color-on-primary); border-color: var(--color-primary); font-weight: bold; }
        .cfg-btn { padding: 0.25rem 0.75rem; border-radius: 1rem; border: 1px solid var(--color-outline-variant); cursor: pointer; font-size: 0.8rem; background: transparent; color: var(--color-on-surface); }
        .cfg-btn.active { background: #a371f7; color: #fff; border-color: #a371f7; }
        .refresh-btn { padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid var(--color-outline-variant); cursor: pointer; background: transparent; color: var(--color-on-surface); font-size: 0.9rem; }
        .refresh-btn:hover { background: var(--color-surface-container-high); }
        .seed-row { padding: 0.25rem 0; border-bottom: 1px solid var(--color-outline-variant); font-size: 0.8rem; display: flex; flex-wrap: wrap; gap: 0.25rem; align-items: center; }
        .seed-row.cold { opacity: 0.4; text-decoration: line-through; }
        .tag-btn { padding: 0.1rem 0.4rem; border-radius: 0.75rem; border: 1px solid var(--color-outline-variant); cursor: pointer; font-size: 0.7rem; background: transparent; color: var(--color-on-surface); }
        .tag-btn.t0 { background: #6e7681; color: #fff; border-color: #6e7681; } .tag-btn.t1 { background: #f85149; color: #fff; border-color: #f85149; }
        .tag-btn.t2 { background: var(--color-primary); color: var(--color-on-primary); border-color: var(--color-primary); } .tag-btn.t3 { background: #6e7681; color: #fff; border-color: #6e7681; }
        .test-btn { padding: 0.1rem 0.5rem; border-radius: 0.75rem; border: 1px solid var(--color-outline-variant); cursor: pointer; font-size: 0.7rem; background: transparent; color: var(--color-on-surface); }
        .test-btn.active { background: #a371f7; color: #fff; border-color: #a371f7; }
        .clear { cursor: pointer; color: #f85149; font-size: 0.8rem; }
        .col5 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 1rem; }
        @media(max-width:900px){.col5{grid-template-columns:1fr}}
        .progress { height: 6px; background: var(--color-surface-container-high); border-radius: 3px; overflow: hidden; max-width: 400px; margin: 0.25rem 0; }
        .progress div { height: 100%; float: left; }
        .bar-ok{background:#d29922} .bar-play{background:#d29922} .bar-unk{background:#6e7681} .bar-pend{background:#3fb950}
    </style>
</head>
<body class="bg-background text-on-surface relative mt-16 m-auto max-w-screen-2xl min-h-screen box-border flex flex-col items-start px-3 pb-3">
    <header class="flex gap-3 items-center md:justify-start justify-center mb-3 w-full"><img src="/public/img/logo.png" class="w-9 h-9"><h1 class="text-4xl mt-4 font-black mb-4 text-on-background">Starpoint</h1></header>
    <div class="md:grid md:grid-cols-sidebar flex flex-col gap-5 w-full h-fit">
        <nav class="px-3 py-5 gap-3 flex flex-col bg-surface-container-low rounded-3xl h-fit w-full">
            <a href="/" class="px-5 py-3 flex gap-3 items-center rounded-full hover:bg-surface-container-high text-on-surface text-lg transition-colors"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="fill-on-surface"><path d="M520-600v-240h320v240H520ZM120-440v-400h320v400H120Zm400 320v-400h320v400H520Zm-400 0v-240h320v240H120Zm80-400h160v-240H200v240Zm400 320h160v-240H600v240Zm0-480h160v-80H600v80ZM200-200h160v-80H200v80Zm160-320Zm240-160Zm0 240ZM360-280Z"/></svg>首页</a>
            <a href="/player" class="px-5 py-3 flex gap-3 items-center rounded-full hover:bg-surface-container-high text-on-surface text-lg transition-colors"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="fill-on-surface"><path d="M40-160v-112q0-34 17.5-62.5T104-378q62-31 126-46.5T360-440q66 0 130 15.5T616-378q29 15 46.5 43.5T680-272v112H40Zm720 0v-120q0-44-24.5-84.5T666-434q51 6 96 20.5t84 35.5q36 20 55 44.5t19 53.5v120H760ZM360-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47Z"/></svg>玩家</a>
            <a href="/mail" class="px-5 py-3 flex gap-3 items-center rounded-full hover:bg-surface-container-high text-on-surface text-lg transition-colors"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="fill-on-surface"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Z"/></svg>发送邮件</a>
            <div class="px-5 py-3 flex gap-3 items-center bg-primary rounded-full w-full font-bold text-on-primary text-lg"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="fill-on-primary"><path d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>种子</div>
        </nav>
        <article class="w-full flex flex-col gap-4">
            <h1 class="text-4xl font-bold text-on-background">种子验证器</h1>
            <div class="flex flex-wrap gap-3 items-center">
                <button class="refresh-btn" onclick="load()">刷新</button>
                <span class="text-sm text-on-surface-variant">模式:</span>
                <button id="btnNatural" class="mode-btn active" onclick="setMode('natural')">自然模式</button>
                <button id="btnPlay" class="mode-btn" onclick="setMode('play')">播放模式</button>
                <button id="btnTest" class="mode-btn" onclick="setMode('test')">测试模式</button>
            </div>

            <!-- ====== 卡池选择 ====== -->
            <div class="card">
                <div class="flex flex-wrap gap-2 items-center mb-2" id="cfgSelector"></div>
                <div id="cfgSummary" class="flex flex-wrap gap-3"></div>
            </div>

            <!-- ====== 验证池 ====== -->
            <div class="card" id="verifiedSection">
                <h2 class="text-lg font-semibold mb-2" style="color:#a371f7">验证池 <span class="text-xs" style="color:#888">（play=1 ✓ + 稀有度 ✓，自然模式优先使用）</span></h2>
                <div id="testSeedBar" class="flex flex-wrap gap-3 items-center mb-3" style="font-size:0.85rem"></div>
                <div class="col5" id="verifiedColumns" style="display:none">
                    <div><h3 class="text-sm font-semibold mb-1" style="color:#f85149">★3 <span id="vr3Count">(0)</span></h3><div id="vr3"></div></div>
                    <div><h3 class="text-sm font-semibold mb-1" style="color:#d29922">★4 <span id="vr4Count">(0)</span></h3><div id="vr4"></div></div>
                    <div><h3 class="text-sm font-semibold mb-1" style="color:#b0882c">★4保底 <span id="vr4bCount">(0)</span></h3><div id="vr4b"></div></div>
                    <div><h3 class="text-sm font-semibold mb-1" style="color:#3fb950">★5 <span id="vr5Count">(0)</span></h3><div id="vr5"></div></div>
                    <div><h3 class="text-sm font-semibold mb-1" style="color:#2ea043">★5保底 <span id="vr5bCount">(0)</span></h3><div id="vr5b"></div></div>
                </div>
                <div id="verifiedEmpty" class="text-xs text-on-surface-variant">暂无已验证种子</div>
            </div>

            <!-- ====== 播放池 ====== -->
            <div class="card" id="playSection">
                <h2 class="text-lg font-semibold mb-2" style="color:#d29922">播放池 <span class="text-xs" style="color:#888">（play=1 ✓，稀有度 ⚠️ 待 C3032 校验，自动移入验证池）</span></h2>
                <div class="col5" id="playColumns" style="display:none">
                    <div><h3 class="text-sm font-semibold mb-1" style="color:#f85149">★3 <span id="p3Count">(0)</span></h3><div id="p3"></div></div>
                    <div><h3 class="text-sm font-semibold mb-1" style="color:#d29922">★4 <span id="p4Count">(0)</span></h3><div id="p4"></div></div>
                    <div><h3 class="text-sm font-semibold mb-1" style="color:#b0882c">★4保底 <span id="p4bCount">(0)</span></h3><div id="p4b"></div></div>
                    <div><h3 class="text-sm font-semibold mb-1" style="color:#3fb950">★5 <span id="p5Count">(0)</span></h3><div id="p5"></div></div>
                    <div><h3 class="text-sm font-semibold mb-1" style="color:#2ea043">★5保底 <span id="p5bCount">(0)</span></h3><div id="p5b"></div></div>
                </div>
                <div id="playEmpty" class="text-xs text-on-surface-variant">暂无播放种子</div>
            </div>

            <!-- ====== 测试池 ====== -->
            <div class="card" id="testSection">
                <h2 class="text-lg font-semibold text-on-surface-variant mb-2">测试池 <span class="text-xs" style="color:#888">（确认池 ≥ 等待校验 ≥ 测试池）</span></h2>
                <div class="progress"><div class="bar-ok" id="barOk" style="width:0"></div><div class="bar-play" id="barPlay" style="width:0"></div><div class="bar-unk" id="barUnk" style="width:0"></div></div>
                <div id="testStats"></div><p id="testSummary" class="text-xs text-on-surface-variant mt-1"></p>
            </div>
        </article>
    </div>
    <script>
    function fmt(n) { return n.toLocaleString(); }
    async function setMode(m) { await fetch('/api/seeds/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:m})});load(); }
    async function selectCfg(id) { currentGroup = GROUPS.find(g => g.id === id) || GROUPS[0]; load(); }
    async function setTag(seed,tag,movieId) { await fetch('/api/seeds/tag',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({seed,tag,movieId:movieId||currentGroup.movies[0]})});load(); }
    async function setTestSeed(seed,rarity) { await fetch('/api/seeds/test-seed',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({seed,rarity})});load(); }
    async function clearTestSeed(rarity) { await fetch('/api/seeds/test-seed?rarity='+rarity,{method:'DELETE'});load(); }

    var TAG = ['未测试','热血躲避球','普通躲避球','冷血躲避球'];
    var TAG_S = ['未','热','普','冷'];
    var TAG_C = ['t0','t1','t2','t3'];
    var GROUPS = [
        { id: 'fes', name: '流星祭', movies: ['fes', 'fes_guarantee'], poolSize: 200000 },
        { id: 'normal', name: '普通', movies: ['normal', 'normal_guarantee'], poolSize: 200000 }
    ];
    var currentGroup = null;
    var currentMovieId = null;

    function tagBtns(seed, currentTag) {
        var h = '';
        TAG.forEach(function(t,i){ h += '<button class="tag-btn '+(t===currentTag?TAG_C[i]:'')+'" onclick="setTag('+seed+',\''+t+'\',\''+currentMovieId+'\')">'+TAG_S[i]+'</button>'; });
        return h;
    }

    function renderSeedRow(p, rarity, isTestSeed, showTestBtn) {
        var tag = p.tag||'未测试', cold = tag==='冷血躲避球';
        var h = '<div class="seed-row'+(cold?' cold':'')+'">'
            + '<span class="'+(cold?'':'pur')+'" style="width:70px">'+p.seed+'</span>'
            + '<span class="text-on-surface-variant" style="font-size:0.7rem;width:16px">'+TAG_S[TAG.indexOf(tag)]+'</span>'
            + tagBtns(p.seed, tag);
        if (showTestBtn) {
            h += '<button class="test-btn '+(isTestSeed?'active':'')+'" onclick="setTestSeed('+p.seed+','+rarity+')" '+(cold?'disabled':'')+'>★'+rarity+'测试</button>';
        }
        h += '</div>';
        return h;
    }

    function renderSeedRowSimple(p) {
        var tag = p.tag||'未测试', cold = tag==='冷血躲避球';
        return '<div class="seed-row'+(cold?' cold':'')+'">'
            + '<span class="'+(cold?'':'pur')+'" style="width:70px">'+p.seed+'</span>'
            + '<span class="text-on-surface-variant" style="font-size:0.7rem;width:16px">'+TAG_S[TAG.indexOf(tag)]+'</span>'
            + tagBtns(p.seed, tag)
            + '</div>';
    }

    function fillColumns(list, rarity, isGuarantee, colPrefix, tsArr, showTestBtn) {
        var items = list.filter(function(p){ return p.rarity===rarity && (rarity===3 || p._isGuarantee===isGuarantee); });
        var countEl = document.getElementById(colPrefix+'Count');
        if (countEl) countEl.textContent = '('+items.length+')';
        var el = document.getElementById(colPrefix);
        if (!el) return;
        el.innerHTML = items.length>0
            ? items.map(function(p){
                return showTestBtn
                    ? renderSeedRow(p, rarity, tsArr[rarity-3]===p.seed, true)
                    : renderSeedRowSimple(p);
            }).join('')
            : '<div class="text-xs text-on-surface-variant" style="padding:0.25rem 0">暂无</div>';
    }

    async function load() {
        if (!currentGroup) currentGroup = GROUPS[0];
        var group = currentGroup;

        var allStats = [];
        for (var m of group.movies) {
            var res = await fetch('/api/seeds/stats?movieId=' + m);
            allStats.push(await res.json());
        }

        var s = {
            mode: allStats[0].mode, test_seeds: allStats[0].test_seeds, movieIds: allStats[0].movieIds,
            confirm: 0, play_total: 0, unknown: 0, mov_play: 0, pending: 0, verified: 0,
            total: 0, tested: 0, coverage: 0, play_r3: 0, play_r4: 0, play_r5: 0
        };
        for (var st of allStats) {
            s.confirm += st.confirm || 0; s.play_total += st.play_total || 0; s.unknown += st.unknown || 0;
            s.mov_play += st.mov_play || 0; s.pending += st.pending || 0; s.verified += st.verified || 0;
            s.play_r3 += st.play_r3 || 0; s.play_r4 += st.play_r4 || 0; s.play_r5 += st.play_r5 || 0;
            s.total += st.movie_total || st.total || 0; s.tested += st.tested || 0;
        }
        s.coverage = s.total > 0 ? Math.round(s.tested / s.total * 100) : 0;

        document.getElementById('btnNatural').className = 'mode-btn'+(s.mode==='natural'?' active':'');
        document.getElementById('btnPlay').className = 'mode-btn'+(s.mode==='play'?' active':'');
        document.getElementById('btnTest').className = 'mode-btn'+(s.mode==='test'?' active':'');

        var ch = '';
        GROUPS.forEach(function(g){ ch += '<button class="cfg-btn'+(g.id===group.id?' active':'')+'" onclick="selectCfg(\''+g.id+'\')">'+g.name+'</button> '; });
        document.getElementById('cfgSelector').innerHTML = ch;

        // Fetch verified + play lists for each movie
        var allVerified = [], allPlay = [];
        for (var m of group.movies) {
            var listRes = await fetch('/api/seeds/list?movieId=' + m);
            var data = await listRes.json();
            (data.verified || []).forEach(function(p){ p._movie = m; p._isGuarantee = m.endsWith('_guarantee'); allVerified.push(p); });
            (data.play || []).forEach(function(p){ p._movie = m; p._isGuarantee = m.endsWith('_guarantee'); allPlay.push(p); });
        }
        var verifiedList = allVerified;
        var playList = allPlay;
        var pMap = {}; playList.forEach(function(p){pMap[p.seed]=p;});

        // CfgSummary — use allStats from first fetch, no second fetch
        var v = s.verified || 0, t = s.mov_play;
        var baseConfirm = 0, gtConfirm = 0;
        for (var st of allStats) {
            var isGuarantee = (st.movieId || '').endsWith('_guarantee');
            if (isGuarantee) gtConfirm += st.confirm || 0;
            else baseConfirm += st.confirm || 0;
        }
        document.getElementById('cfgSummary').innerHTML =
            '<span class="stat"><span class="label" style="color:#a371f7">验证池</span><br><span class="value" style="color:#a371f7">'+v+'</span></span>'
            + '<span class="stat"><span class="label pur">播放池</span><br><span class="value pur">'+t+'</span></span>'
            + '<span class="stat"><span class="label ok">确认·非保底</span><br><span class="value ok">'+baseConfirm+'</span></span>'
            + '<span class="stat"><span class="label" style="color:#b0882c">确认·保底</span><br><span class="value" style="color:#b0882c">'+gtConfirm+'</span></span>';

        // TestSeed bar (in verified card)
        var tsArr = s.test_seeds || [null,null,null];
        var tsH = '<span class="text-xs text-on-surface-variant">testSeed:</span> ';
        [3,4,5].forEach(function(r){
            var ts = tsArr[r-3];
            tsH += '<span>★'+r+'=</span>';
            if (ts) {
                var e = pMap[ts] || null;
                var tag = e ? e.tag : '未测试';
                tsH += '<span class="pur">'+ts+'</span> <span style="font-size:0.7rem;color:#888">['+TAG_S[TAG.indexOf(tag)]+']</span> ';
                tsH += tagBtns(ts, tag);
                tsH += ' <span class="clear" onclick="clearTestSeed('+r+')">✕</span> ';
            } else { tsH += '<span style="color:#888">[无]</span> ';}
        });
        document.getElementById('testSeedBar').innerHTML = tsH;

        // Verified columns (+ testBtn)
        if (v > 0) {
            document.getElementById('verifiedColumns').style.display = '';
            document.getElementById('verifiedEmpty').style.display = 'none';
            [{col:'vr3',r:3,g:false},{col:'vr4',r:4,g:false},{col:'vr4b',r:4,g:true},{col:'vr5',r:5,g:false},{col:'vr5b',r:5,g:true}].forEach(function(cfg){
                fillColumns(verifiedList, cfg.r, cfg.g, cfg.col, tsArr, true);
            });
        } else {
            document.getElementById('verifiedColumns').style.display = 'none';
            document.getElementById('verifiedEmpty').style.display = '';
        }

        // Play columns (no testBtn)
        if (t > 0) {
            document.getElementById('playColumns').style.display = '';
            document.getElementById('playEmpty').style.display = 'none';
            [{col:'p3',r:3,g:false},{col:'p4',r:4,g:false},{col:'p4b',r:4,g:true},{col:'p5',r:5,g:false},{col:'p5b',r:5,g:true}].forEach(function(cfg){
                fillColumns(playList, cfg.r, cfg.g, cfg.col, tsArr, false);
            });
        } else {
            document.getElementById('playColumns').style.display = 'none';
            document.getElementById('playEmpty').style.display = '';
        }

        // Test pool stats
        document.getElementById('testStats').innerHTML =
            '<span class="stat"><span class="label ok">确认池</span><br><span class="value ok">'+fmt(s.confirm)+'</span></span>'
            + '<span class="stat"><span class="label" style="color:#3fb950">等待校验</span><br><span class="value" style="color:#3fb950">'+fmt(s.pending||0)+'</span></span>'
            + '<span class="stat"><span class="label unk">测试池</span><br><span class="value unk">'+fmt(s.unknown)+'</span></span>';
        document.getElementById('testSummary').textContent = '已测 '+fmt(s.tested)+' | 覆盖率 '+s.coverage+'%';
        var tt = s.total;
        document.getElementById('barOk').style.width=(s.confirm/tt*100)+'%';
        document.getElementById('barPlay').style.width=((s.pending||0)/tt*100)+'%';
        document.getElementById('barUnk').style.width=(s.unknown/tt*100)+'%';
    }

    load();
    </script>
</body>
</html>
